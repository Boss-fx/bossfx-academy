<!doctype html>
<html><head><meta charset="utf-8"><title>ASL integration test</title></head>
<body>
<h1>PWA → ASL → SDK → Platform</h1>
<pre id="out">running…</pre>
<script src="config.js"></script>
<script src="lib/vendor/bossfx-sdk.browser.js"></script>
<script src="services/ai-client.js"></script>
<script src="services/capability-service.js"></script>
<script src="services/mirror-service.js"></script>
<script src="chatbot.js"></script>
<script>
  // ?legacy=1 → ROLLBACK MODE: no override; assert flag OFF + legacy intact.
  var legacyMode = new URLSearchParams(location.search).get('legacy') === '1';
  if (legacyMode) {
    var out0 = [];
    function log0(s){ out0.push(s); document.getElementById('out').textContent = out0.join('\n'); }
    log0('ROLLBACK MODE (flag untouched)');
    log0('config.aiPlatform.enabled: ' + BFX.config.aiPlatform.enabled);
    log0('aiClient.isEnabled(): ' + BFX.aiClient.isEnabled());
    log0('aiClient.get(): ' + (BFX.aiClient.get() === null ? 'null (SDK path inert)' : 'ACTIVE — FAIL'));
    log0('legacy Mirror loaded: ' + (typeof BFX.mirror !== 'undefined'));
    var pass0 = BFX.config.aiPlatform.enabled === false && BFX.aiClient.get() === null && typeof BFX.mirror !== 'undefined';
    log0(pass0 ? 'ROLLBACK-VALIDATION: PASS' : 'ROLLBACK-VALIDATION: FAIL');
    throw new Error('legacy-mode-stop'); // stop before the SDK flow
  }
  // TEST-ONLY overrides: enable the flag and supply a minted session token
  BFX.config.aiPlatform.enabled = true;
  var params = new URLSearchParams(location.search);
  var tok = params.get('token');
  BFX.auth = { getAccessToken: function () { return tok; } };

  var out = [];
  function log(s) { out.push(s); document.getElementById('out').textContent = out.join('\n'); }

  (async function () {
    try {
      log('sdk global: ' + (window.BossFxSDK ? 'loaded' : 'MISSING'));
      log('asl enabled: ' + BFX.aiClient.isEnabled());
      var client = BFX.aiClient.get();
      var h = await client.health();
      log('health: ' + h.status + ' aiCore=' + h.aiCoreVersion + ' requestId=' + (h.requestId||'').slice(0,8));
      var caps = await BFX.capabilityService.list();
      log('capabilities: ' + caps.map(function(c){return c.id+'('+(c.enabled?'on':'off')+')';}).join(' '));
      var la = await BFX.capabilityService.isEnabled('learning-assistant');
      log('learning-assistant enabled: ' + la);

      // SESSION C — real chat through MirrorService (ASL) -> SDK -> /v1/chat
      log('--- chat: grounded question ---');
      var t0 = Date.now();
      var r1 = await BFX.mirrorService.ask('What is leverage in forex trading?', { page: '/integration-test' });
      log('kind: ' + r1.kind + ' (' + (Date.now() - t0) + 'ms) requestId=' + (r1.requestId||'').slice(0,8));
      log('answer: ' + (r1.answer || '').slice(0, 140) + '…');
      log('citations: ' + r1.citations.map(function(c){ return c.sourceRef + '@' + c.score.toFixed(2); }).join(' | '));

      log('--- chat: out-of-scope (grounding guarantee) ---');
      var t1 = Date.now();
      var r2 = await BFX.mirrorService.ask('What is the capital city of France?', { page: '/integration-test' });
      log('kind: ' + r2.kind + ' (' + (Date.now() - t1) + 'ms) — expected no_answer, citations=' + r2.citations.length);

      var pass = r1.kind === 'answer' && r1.citations.length > 0 && r2.kind === 'no_answer';
      log(pass ? 'E2E-BROWSER-CHAT: PASS' : 'E2E-BROWSER-CHAT: FAIL');
    } catch (e) {
      log('E2E-BROWSER: FAIL — ' + (e && e.name) + ': ' + (e && e.message) + ' code=' + (e && e.code));
    }
  })();
</script>
</body></html>
